name: App / Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version-file: .tools-versions
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.SCREENSAVARR_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/screensavarr.keystore"
      - name: Assemble signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/screensavarr.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SCREENSAVARR_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SCREENSAVARR_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SCREENSAVARR_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -Pscreensavarr.version="$GITHUB_REF_NAME"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "app/build/outputs/apk/release/app-release.apk#screensavarr-v${version}.apk" \
            --title "screensavarr ${version}" \
            --generate-notes
